services:
  db-tunnel:
    image: alpine:latest
    container_name: servicelink-db-tunnel
    restart: unless-stopped
    volumes:
      - /Users/ph/Downloads/localFiles/ServiceLinkBackEndFiles/cloudbox.pem:/tmp/cloudbox.pem:ro
    command: >
      sh -c "
        apk add --no-cache openssh-client &&
        mkdir -p /root/.ssh &&
        cp /tmp/cloudbox.pem /root/.ssh/cloudbox.pem &&
        chmod 400 /root/.ssh/cloudbox.pem &&
        echo 'Starting SSH tunnel to Oracle Cloud...' &&
        ssh -i /root/.ssh/cloudbox.pem -N -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -o ExitOnForwardFailure=yes -L 0.0.0.0:3306:127.0.0.1:3306 opc@163.192.47.65
      "
    expose:
      - "3306"
    # Optional: If you need DBeaver/MySQL Workbench on your Mac to connect to the container tunnel without conflicting with host port 3306:
    # ports:
    #   - "3307:3306"

  web-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: servicelink-web-app
    restart: unless-stopped
    depends_on:
      - db-tunnel
    env_file:
      - .env
    environment:
      - DB_HOST=db-tunnel
      - DB_PORT=3306
      - FLASK_APP=wsgi.py
      - FLASK_DEBUG=1
    ports:
      - "5001:5000"
    volumes:
      - ./app:/app/app
