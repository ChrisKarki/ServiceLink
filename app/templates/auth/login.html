<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In · ServiceLink</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@100;200;300;400;500;600;700&family=IBM+Plex+Sans:wght@100;200;300;400;500;600;700&family=Montserrat:wght@100;200;300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</head>

<body class="auth-page">

    <div class="toast-container" id="toastContainer"></div>

    <button class="icon-btn theme-toggle theme-corner" onclick="toggleTheme()" title="Toggle dark / light mode">
        <span class="icon-moon"><svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg></span>
        <span class="icon-sun"><svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg></span>
    </button>

    <div class="panel login-card">
        <div class="brand" style="justify-content: center;">
            <img src="{{ url_for('static', filename='assets/logo.svg') }}" alt="Logo" style="height: 48px; width: auto;">
            ServiceLink
        </div>

        <form method="post" action="{{ url_for('auth.login', next=request.args.get('next')) }}">
            <div class="form-group" style="margin-bottom: 20px;">
                <label class="form-label" for="login-email">Email Address</label>
                <div style="position: relative;">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); pointer-events: none;">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
                        </path>
                    </svg>
                    <input type="email" class="form-control" id="login-email" name="email"
                        placeholder="you@company.com" required autofocus autocomplete="email">
                </div>
            </div>
            <div class="form-group" style="margin-bottom: 20px;">
                <label class="form-label" for="login-password">Password</label>
                <div style="position: relative;">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); pointer-events: none;">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                        </path>
                    </svg>
                    <input type="password" class="form-control" id="login-password" name="password"
                        placeholder="••••••••••" required autocomplete="current-password">
                </div>
            </div>

            <!-- TOTP MFA (FR-1.1) is deferred; the control stays for UI parity
                 with the Phase 3 design but is not yet read server-side. -->
            <div style="background: var(--card-tint); border: 1px solid var(--panel-border); border-radius: 6px; padding: 12px 16px; margin-bottom: 24px; display: flex; align-items: center; gap: 12px; cursor: pointer;"
                onclick="document.getElementById('totp-checkbox').click()">
                <input type="checkbox" id="totp-checkbox" name="use_totp"
                    style="width: 16px; height: 16px; accent-color: var(--accent-color); cursor: pointer;"
                    onclick="event.stopPropagation()">
                <label for="totp-checkbox"
                    style="font-size: 13px; font-weight: 500; color: var(--text-primary); cursor: pointer; margin-bottom: 0;">Use
                    Authenticator Code</label>
            </div>

            <button type="submit" class="btn btn-primary"
                style="width: 100%; padding: 14px; font-size: 16px; font-weight: 600;">Sign In</button>
        </form>

        <div class="auth-links">
            <a href="{{ url_for('auth.forgot_password') }}">Forgot Password?</a>
            <a href="{{ url_for('auth.register') }}">Register</a>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            {% for category, message in messages %}
            showToast({{ message | tojson }}, {{ category | tojson }});
            {% endfor %}
        });
    </script>
    {% endif %}
    {% endwith %}
</body>

</html>
