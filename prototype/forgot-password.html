<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password · ServiceLink</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@100;200;300;400;500;600;700&family=IBM+Plex+Sans:wght@100;200;300;400;500;600;700&family=Montserrat:wght@100;200;300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <script src="js/theme.js"></script>
</head>

<body class="auth-page">

    <div class="toast-container" id="toastContainer"></div>

    <button class="icon-btn theme-toggle theme-corner" onclick="toggleTheme()" title="Toggle dark / light mode">
        <span class="icon-moon"><svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg></span>
        <span class="icon-sun"><svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg></span>
    </button>

    <div class="panel login-card">
        <div class="brand" style="justify-content: center;">
            <img src="assets/logo.svg" alt="Logo" style="height: 48px; width: auto;">
            ServiceLink
        </div>
        <p class="text-sm" style="text-align: center; margin-bottom: 24px;">
            Enter your account email and we will send you a password reset link.
        </p>
        <div class="form-group" style="margin-bottom: 24px;">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-control" id="reset-email" placeholder="you@company.com">
        </div>
        <button class="btn btn-primary" style="width: 100%; padding: 14px; font-size: 16px; font-weight: 600;"
            onclick="doPasswordReset()">Send Reset Link</button>
        <div class="auth-links">
            <a href="index.html">Back to Sign In</a>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
