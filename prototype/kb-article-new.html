<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New KB Article · ServiceLink</title>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@100;200;300;400;500;600;700&family=IBM+Plex+Sans:wght@100;200;300;400;500;600;700&family=Montserrat:wght@100;200;300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <script src="js/theme.js"></script>
    <style>
        .view-section h1,
        .kb-title {
            font-size: 24px !important;
            font-weight: 700 !important;
            line-height: 1.3 !important;
            color: var(--text-primary);
            margin: 0;
        }
    </style>
</head>

<body data-page="kb-article-new">

    <div class="toast-container" id="toastContainer"></div>

    <header data-shell="topbar"></header>

    <div class="app-layout">
        <nav data-shell="sidebar"></nav>

        <div class="main-content">
            <div class="content-area">
                <section class="view-section">
                    <div class="flex-between mb-4">
                        <h1 class="kb-title" style="margin: 0;">New Article</h1>
                        <div style="display: flex; gap: 12px;">
                            <button class="btn btn-secondary"
                                onclick="location.href='knowledge-base.html'">Cancel</button>
                            <button class="btn btn-secondary" onclick="flash('Draft saved successfully!', 'info')">Save
                                Draft</button>
                            <button class="btn btn-primary" style="display: flex; align-items: center; gap: 8px;"
                                onclick="flash('Article created and published successfully!', 'success', 'kb-article-view.html')">
                                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
                                </svg>
                                Publish Article
                            </button>
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 3fr 1fr; gap: 24px;">
                        <!-- Main Editor Panel -->
                        <div class="panel" style="margin-bottom: 0; display: flex; flex-direction: column; gap: 20px;">
                            <div>
                                <input type="text" class="form-control"
                                    placeholder="Enter a descriptive article title (e.g. Troubleshooting Remote VPN Connectivity)..."
                                    style="font-size: 16px; font-weight: 500; padding: 12px 16px; width: 100%;">
                            </div>

                            <!-- Formatting Toolbar -->
                            <div>
                                <div
                                    style="display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 12px; background: var(--button-secondary-bg); border: 1px solid var(--panel-border); border-bottom: none; border-radius: 8px 8px 0 0;">
                                    <button class="btn btn-secondary btn-sm"
                                        style="padding: 4px 10px; font-weight: bold;" title="Bold">B</button>
                                    <button class="btn btn-secondary btn-sm"
                                        style="padding: 4px 10px; font-style: italic;" title="Italic">I</button>
                                    <button class="btn btn-secondary btn-sm"
                                        style="padding: 4px 10px; text-decoration: underline;"
                                        title="Underline">U</button>
                                    <div style="width: 1px; background: var(--panel-border); margin: 0 4px;"></div>
                                    <button class="btn btn-secondary btn-sm" style="padding: 4px 10px;"
                                        title="Heading 1">H1</button>
                                    <button class="btn btn-secondary btn-sm" style="padding: 4px 10px;"
                                        title="Heading 2">H2</button>
                                    <button class="btn btn-secondary btn-sm"
                                        style="padding: 4px 10px; font-family: monospace;"
                                        title="Code Block">&lt;/&gt;</button>
                                    <div style="width: 1px; background: var(--panel-border); margin: 0 4px;"></div>
                                    <button class="btn btn-secondary btn-sm" style="padding: 4px 10px; display: flex; align-items: center; gap: 4px;"
                                        title="Bullet List">
                                        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                d="M4 6h16M4 12h16M4 18h16"></path>
                                        </svg>
                                        List
                                    </button>
                                    <button class="btn btn-secondary btn-sm" style="padding: 4px 10px; display: flex; align-items: center; gap: 4px;"
                                        title="Insert Link">
                                        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 0 00-5.656-5.656l-1.1 1.1"></path>
                                        </svg>
                                        Link
                                    </button>
                                    <button class="btn btn-secondary btn-sm" style="padding: 4px 10px; display: flex; align-items: center; gap: 4px;"
                                        title="Attach File">
                                        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path>
                                        </svg>
                                        Attach
                                    </button>
                                </div>
                                <textarea class="form-control"
                                    style="width: 100%; min-height: 420px; font-family: monospace; font-size: 14px; line-height: 1.6; padding: 16px; border-radius: 0 0 8px 8px; resize: vertical; background: var(--input-bg);"
                                    placeholder="## 1. Overview &amp; Scope&#10;Provide a brief summary of the topic or issue addressed by this article...&#10;&#10;## 2. Resolution Steps&#10;**Step 1:** First diagnosis or verification step...&#10;**Step 2:** Configuration change or remediation step...&#10;**Step 3:** Final verification check...&#10;&#10;## 3. Escalation &amp; Related Resources&#10;If the issue persists, escalate to Level 2 and attach relevant system logs."></textarea>
                            </div>
                        </div>

                        <!-- Right Metadata Sidebar -->
                        <div style="display: flex; flex-direction: column; gap: 24px;">
                            <!-- Author Card -->
                            <div class="panel" style="margin-bottom: 0;">
                                <div style="display: flex; align-items: center; gap: 12px;">
                                    <div
                                        style="width: 44px; height: 44px; border-radius: 50%; background: var(--button-secondary-bg); border: 1px solid var(--panel-border); display: flex; align-items: center; justify-content: center; color: var(--text-secondary); flex-shrink: 0;">
                                        <svg width="24" height="24" fill="none" stroke="currentColor"
                                            viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z">
                                            </path>
                                        </svg>
                                    </div>
                                    <div>
                                        <div style="font-size: 14px; font-weight: 600; color: var(--text-primary);">
                                            Prabhnoorjit Hans</div>
                                        <div class="text-sm"
                                            style="color: var(--text-secondary); line-height: 1.4; margin-top: 2px;">
                                            Draft Author</div>
                                    </div>
                                </div>
                            </div>

                            <div class="panel"
                                style="margin-bottom: 0; display: flex; flex-direction: column; gap: 16px;">
                                <div>
                                    <label class="text-sm"
                                        style="color: var(--text-secondary); display: block; margin-bottom: 6px;">Category
                                        *</label>
                                    <select class="form-control"
                                        style="width: 100%; padding: 8px 12px; background-color: var(--input-bg);">
                                        <option selected disabled>Select Category...</option>
                                        <option>Networking &amp; VPN</option>
                                        <option>Hardware &amp; Policies</option>
                                        <option>Software &amp; Licenses</option>
                                        <option>Security &amp; Identity</option>
                                        <option>HR &amp; Onboarding</option>
                                    </select>
                                </div>

                                <div>
                                    <label class="text-sm"
                                        style="color: var(--text-secondary); display: block; margin-bottom: 6px;">Visibility</label>
                                    <select class="form-control"
                                        style="width: 100%; padding: 8px 12px; background-color: var(--input-bg);">
                                        <option selected>Public (All Users)</option>
                                        <option>Internal Only (Technicians)</option>
                                        <option>Draft / Hidden</option>
                                    </select>
                                </div>
                            </div>

                            <div class="panel"
                                style="margin-bottom: 0; display: flex; flex-direction: column; gap: 16px;">
                                <div>
                                    <label class="text-sm"
                                        style="color: var(--text-secondary); display: block; margin-bottom: 6px;">Add
                                        Tags
                                        (comma separated)</label>
                                    <input type="text" class="form-control"
                                        placeholder="e.g. VPN, Windows11, Network..."
                                        style="width: 100%; padding: 8px 12px; font-size: 13px;">
                                </div>
                                <div style="display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px;">
                                    <span class="text-sm"
                                        style="color: var(--text-secondary); width: 100%; font-size: 12px;">Suggested
                                        Tags:</span>
                                    <span class="badge"
                                        style="background: var(--button-secondary-bg); border: 1px solid var(--panel-border); cursor: pointer;"
                                        onclick="showToast('Added tag #Troubleshooting', 'info')">+
                                        #Troubleshooting</span>
                                    <span class="badge"
                                        style="background: var(--button-secondary-bg); border: 1px solid var(--panel-border); cursor: pointer;"
                                        onclick="showToast('Added tag #Windows11', 'info')">+ #Windows11</span>
                                    <span class="badge"
                                        style="background: var(--button-secondary-bg); border: 1px solid var(--panel-border); cursor: pointer;"
                                        onclick="showToast('Added tag #Security', 'info')">+ #Security</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <script src="js/layout.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
