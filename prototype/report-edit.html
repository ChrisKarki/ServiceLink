<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Report · ServiceLink</title>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@100;200;300;400;500;600;700&family=IBM+Plex+Sans:wght@100;200;300;400;500;600;700&family=Montserrat:wght@100;200;300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <script src="js/theme.js"></script>
    <style>
        .view-section h1,
        .report-title {
            font-size: 24px !important;
            font-weight: 700 !important;
            line-height: 1.3 !important;
            color: var(--text-primary);
            margin: 0;
        }

        .metric-checkbox-card {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 14px;
            background: var(--button-secondary-bg);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }

        .metric-checkbox-card:hover {
            border-color: var(--accent-color);
        }

        .metric-checkbox-card input[type="checkbox"] {
            margin-top: 3px;
            cursor: pointer;
            accent-color: var(--accent-color);
            width: 16px;
            height: 16px;
        }
    </style>
</head>

<body data-page="report-edit">

    <div class="toast-container" id="toastContainer"></div>

    <header data-shell="topbar"></header>

    <div class="app-layout">
        <nav data-shell="sidebar"></nav>

        <div class="main-content">
            <div class="content-area">
                <section class="view-section">
                    <!-- Header Bar -->
                    <div class="flex-between mb-4">
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <h1 class="report-title" style="margin: 0;">Edit Report</h1>
                            <span class="badge text-xs" style="background: var(--button-secondary-bg); border: 1px solid var(--panel-border); color: var(--text-secondary);">RPT-3001</span>
                        </div>
                        <div style="display: flex; gap: 12px;">
                            <button class="btn btn-secondary"
                                onclick="location.href='report-view.html'">Cancel</button>
                            <button class="btn btn-secondary" style="color: var(--danger-color); border-color: rgba(239, 68, 68, 0.3);"
                                onclick="if(confirm('Are you sure you want to delete report RPT-3001?')) { flash('Report deleted successfully.', 'info', 'reports.html'); }">Delete Report</button>
                            <button class="btn btn-primary" style="display: flex; align-items: center; gap: 8px;"
                                onclick="flash('Report configuration and schedule updated successfully!', 'success', 'report-view.html')">
                                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M5 13l4 4L19 7"></path>
                                </svg>
                                Save Changes
                            </button>
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 3fr 1fr; gap: 24px;">
                        <!-- Main Configuration Panel -->
                        <div style="display: flex; flex-direction: column; gap: 24px;">
                            <!-- Basic Info Card -->
                            <div class="panel" style="margin-bottom: 0; display: flex; flex-direction: column; gap: 20px;">
                                <div>
                                    <label class="form-label"
                                        style="display: block; margin-bottom: 8px; font-weight: 600; color: var(--text-primary);">Report Title *</label>
                                    <input type="text" class="form-control"
                                        value="Executive SLA Compliance & Performance Dashboard"
                                        style="font-size: 16px; font-weight: 500; padding: 12px 16px; width: 100%;">
                                </div>

                                <div>
                                    <label class="form-label"
                                        style="display: block; margin-bottom: 8px; font-weight: 600; color: var(--text-primary);">Description & Objectives</label>
                                    <textarea class="form-control"
                                        style="width: 100%; min-height: 90px; font-size: 14px; line-height: 1.5; padding: 12px 16px; border-radius: 8px; resize: vertical; background: var(--input-bg);">Comprehensive analysis and executive monitoring of SLA compliance thresholds, mean time to resolution (MTTR), and technician productivity across Level 1 and Level 2 enterprise support tiers.</textarea>
                                </div>
                            </div>

                            <!-- Scope & Filters Card -->
                            <div class="panel" style="margin-bottom: 0; display: flex; flex-direction: column; gap: 20px;">
                                <h3 style="font-size: 16px; font-weight: 600; color: var(--text-primary); margin: 0; border-bottom: 1px solid var(--panel-border); padding-bottom: 12px;">Data Scope & Time Horizon</h3>

                                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                                    <div>
                                        <label class="form-label"
                                            style="display: block; margin-bottom: 8px; font-weight: 600; color: var(--text-primary);">Time Period *</label>
                                        <select class="form-control" style="width: 100%; padding: 10px 14px; background-color: var(--input-bg);">
                                            <option selected>Last 30 Days</option>
                                            <option>Last 7 Days</option>
                                            <option>Last 90 Days (Quarterly)</option>
                                            <option>Year to Date (YTD)</option>
                                            <option>Custom Date Range</option>
                                        </select>
                                    </div>

                                    <div>
                                        <label class="form-label"
                                            style="display: block; margin-bottom: 8px; font-weight: 600; color: var(--text-primary);">Target Department</label>
                                        <select class="form-control" style="width: 100%; padding: 10px 14px; background-color: var(--input-bg);">
                                            <option selected>All Departments</option>
                                            <option>Cloud Infrastructure</option>
                                            <option>Network Engineering</option>
                                            <option>Security & Compliance</option>
                                            <option>IT Service Desk (Level 1/2)</option>
                                        </select>
                                    </div>

                                    <div>
                                        <label class="form-label"
                                            style="display: block; margin-bottom: 8px; font-weight: 600; color: var(--text-primary);">Assigned Technician / Team</label>
                                        <select class="form-control" style="width: 100%; padding: 10px 14px; background-color: var(--input-bg);">
                                            <option selected>All Technicians & Teams</option>
                                            <option>Level 1 Support Team</option>
                                            <option>Level 2 Support Team</option>
                                            <option>DevOps & Infrastructure Team</option>
                                        </select>
                                    </div>

                                    <div>
                                        <label class="form-label"
                                            style="display: block; margin-bottom: 8px; font-weight: 600; color: var(--text-primary);">Ticket Priority Filter</label>
                                        <select class="form-control" style="width: 100%; padding: 10px 14px; background-color: var(--input-bg);">
                                            <option selected>All Priorities</option>
                                            <option>Critical & High Priority Only</option>
                                            <option>Normal Priority & Above</option>
                                            <option>SLA Breached Tickets Only</option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                            <!-- Metrics & Widgets Card -->
                            <div class="panel" style="margin-bottom: 0; display: flex; flex-direction: column; gap: 20px;">
                                <div class="flex-between" style="border-bottom: 1px solid var(--panel-border); padding-bottom: 12px;">
                                    <h3 style="font-size: 16px; font-weight: 600; color: var(--text-primary); margin: 0;">Include Dashboard Metrics</h3>
                                    <span class="text-sm" style="color: var(--text-secondary);">Select indicators to include in export</span>
                                </div>

                                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                                    <label class="metric-checkbox-card">
                                        <input type="checkbox" checked>
                                        <div>
                                            <div style="font-weight: 600; font-size: 14px; color: var(--text-primary);">SLA Compliance Rate (%)</div>
                                            <div class="text-sm" style="color: var(--text-secondary); margin-top: 2px;">Percentage of tickets resolved within defined SLA thresholds.</div>
                                        </div>
                                    </label>

                                    <label class="metric-checkbox-card">
                                        <input type="checkbox" checked>
                                        <div>
                                            <div style="font-weight: 600; font-size: 14px; color: var(--text-primary);">Mean Time to Resolution (MTTR)</div>
                                            <div class="text-sm" style="color: var(--text-secondary); margin-top: 2px;">Average hours taken from ticket creation to final closure.</div>
                                        </div>
                                    </label>

                                    <label class="metric-checkbox-card">
                                        <input type="checkbox" checked>
                                        <div>
                                            <div style="font-weight: 600; font-size: 14px; color: var(--text-primary);">Ticket Volume Trends</div>
                                            <div class="text-sm" style="color: var(--text-secondary); margin-top: 2px;">Daily and weekly breakdown of incoming vs resolved requests.</div>
                                        </div>
                                    </label>

                                    <label class="metric-checkbox-card">
                                        <input type="checkbox" checked>
                                        <div>
                                            <div style="font-weight: 600; font-size: 14px; color: var(--text-primary);">First Response Time (FRT)</div>
                                            <div class="text-sm" style="color: var(--text-secondary); margin-top: 2px;">Average duration until technician first acknowledges ticket.</div>
                                        </div>
                                    </label>

                                    <label class="metric-checkbox-card">
                                        <input type="checkbox" checked>
                                        <div>
                                            <div style="font-weight: 600; font-size: 14px; color: var(--text-primary);">Customer Satisfaction (CSAT)</div>
                                            <div class="text-sm" style="color: var(--text-secondary); margin-top: 2px;">Post-resolution survey feedback scores and rating distributions.</div>
                                        </div>
                                    </label>

                                    <label class="metric-checkbox-card">
                                        <input type="checkbox">
                                        <div>
                                            <div style="font-weight: 600; font-size: 14px; color: var(--text-primary);">Reopened Ticket Ratio</div>
                                            <div class="text-sm" style="color: var(--text-secondary); margin-top: 2px;">Frequency of closed incidents reopened by end users.</div>
                                        </div>
                                    </label>
                                </div>
                            </div>
                        </div>

                        <!-- Right Metadata Sidebar -->
                        <div style="display: flex; flex-direction: column; gap: 24px;">
                            <!-- Author Card -->
                            <div class="panel" style="margin-bottom: 0;">
                                <div style="display: flex; align-items: center; gap: 12px;">
                                    <div
                                        style="width: 44px; height: 44px; border-radius: 50%; background: var(--button-secondary-bg); border: 1px solid var(--panel-border); display: flex; align-items: center; justify-content: center; color: var(--text-secondary); flex-shrink: 0;">
                                        <svg width="24" height="24" fill="none" stroke="currentColor"
                                            viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z">
                                            </path>
                                        </svg>
                                    </div>
                                    <div>
                                        <div style="font-size: 14px; font-weight: 600; color: var(--text-primary);">
                                            Prabhnoorjit Hans</div>
                                        <div class="text-sm"
                                            style="color: var(--text-secondary); line-height: 1.4; margin-top: 2px;">
                                            Last saved 3 hours ago</div>
                                    </div>
                                </div>
                            </div>

                            <!-- Settings Card -->
                            <div class="panel"
                                style="margin-bottom: 0; display: flex; flex-direction: column; gap: 16px;">
                                <div>
                                    <label class="text-sm"
                                        style="color: var(--text-secondary); display: block; margin-bottom: 6px;">Category *</label>
                                    <select class="form-control"
                                        style="width: 100%; padding: 8px 12px; background-color: var(--input-bg);">
                                        <option selected>SLA & Compliance</option>
                                        <option>Performance</option>
                                        <option>Operational</option>
                                        <option>Security & Access</option>
                                        <option>Asset & Inventory</option>
                                    </select>
                                </div>

                                <div>
                                    <label class="text-sm"
                                        style="color: var(--text-secondary); display: block; margin-bottom: 6px;">Schedule & Frequency</label>
                                    <select class="form-control"
                                        style="width: 100%; padding: 8px 12px; background-color: var(--input-bg);">
                                        <option>Run Once / Manual Generation</option>
                                        <option selected>Daily at 08:00 AM</option>
                                        <option>Weekly on Mondays (06:00 AM)</option>
                                        <option>Monthly on 1st of Month</option>
                                        <option>Real-time / Continuous Sync</option>
                                    </select>
                                </div>

                                <div>
                                    <label class="text-sm"
                                        style="color: var(--text-secondary); display: block; margin-bottom: 6px;">Export Output Format</label>
                                    <select class="form-control"
                                        style="width: 100%; padding: 8px 12px; background-color: var(--input-bg);">
                                        <option selected>PDF Summary & Executive Deck</option>
                                        <option>Excel / CSV Raw Data Table</option>
                                        <option>Interactive Web Dashboard Only</option>
                                    </select>
                                </div>
                            </div>

                            <!-- Notification & Delivery Card -->
                            <div class="panel"
                                style="margin-bottom: 0; display: flex; flex-direction: column; gap: 16px;">
                                <div>
                                    <label class="text-sm"
                                        style="color: var(--text-secondary); display: block; margin-bottom: 6px;">Automated Delivery (Optional)</label>
                                    <input type="text" class="form-control"
                                        value="exec-leadership@servicelink.internal, tier2-leads@servicelink.internal"
                                        style="width: 100%; padding: 8px 12px; font-size: 13px;">
                                    <div class="text-sm" style="color: var(--text-secondary); font-size: 11px; margin-top: 4px;">Comma-separated list of stakeholders to receive scheduled copies.</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <script src="js/layout.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
