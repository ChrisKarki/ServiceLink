                            </button>

                        </div>

                    </div>

                                    value="Troubleshooting Remote VPN Connectivity Drops"
                                    style="font-size: 16px; font-weight: 500; padding: 12px 16px; width: 100%;">
                            </div>

                            <!-- Formatting Toolbar -->
                            <div>
                                <label class="form-label"
                                    style="display: block; margin-bottom: 8px; font-weight: 600; color: var(--text-primary);">Content

                                <div
                                    style="display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 12px; background: var(--button-secondary-bg); border: 1px solid var(--panel-border); border-bottom: none; border-radius: 8px 8px 0 0;">
                                    <button class="btn btn-secondary btn-sm"
                                        style="padding: 4px 10px; font-weight: bold;" title="Bold">B</button>

                                    <button class="btn btn-secondary btn-sm" style="padding: 4px 10px;"

                                        title="Heading 2">H2</button>
                                    <button class="btn btn-secondary btn-sm"
                                        style="padding: 4px 10px; font-family: monospace;"
                                        title="Code Block">&lt;/&gt;</button>
                                    <div style="width: 1px; background: var(--panel-border); margin: 0 4px;"></div>
                                    <button class="btn btn-secondary btn-sm" style="padding: 4px 10px;"
                                        title="Bullet List">• List</button>
                                    <button class="btn btn-secondary btn-sm" style="padding: 4px 10px;"
                                        title="Insert Link">🔗 Link</button>
                                    <button class="btn btn-secondary btn-sm" style="padding: 4px 10px;"
                                        title="Attach File">📎 Attach</button>
                                </div>
                                <textarea class="form-control"
                                    style="width: 100%; min-height: 420px; font-family: monospace; font-size: 14px; line-height: 1.6; padding: 16px; border-radius: 0 0 8px 8px; resize: vertical; background: var(--input-bg);">## 1. Overview & Scope
                    This guide addresses the common issue where end users experience frequent disconnects from the corporate VPN, specifically when utilizing split-tunneling on Windows 11 machines connecting via home ISPs.

                    ## 2. Resolution Steps

                    **Step 1: Verify the client version.**
                    Ensure the user is running the latest version of the VPN client (v4.2.1 or higher). Older versions have known compatibility issues with recent Windows OS updates.

                    **Step 2: Check MTU Settings.**
                    Often, home ISP routers fragment packets if the MTU is too high. Instruct the user or use remote management to lower the VPN adapter MTU to 1350.

                    ```cmd
                    netsh interface ipv4 set subinterface "VPN Connection" mtu=1350 store=persistent
                    ```

                    **Step 3: Update Network Drivers.**
                    Check the linked hardware resource in ServiceLink. If the device is a Dell XPS model from 2025, push the latest Intel Wi-Fi driver update via the management console.

                    ## 3. Escalation
                    If the issue persists after these steps, escalate the ticket to the Level 2 Network team and attach this KB article indicating steps already taken.</textarea>
