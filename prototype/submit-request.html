<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Request · ServiceLink</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@100;200;300;400;500;600;700&family=IBM+Plex+Sans:wght@100;200;300;400;500;600;700&family=Montserrat:wght@100;200;300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <script src="js/theme.js"></script>
</head>

<body data-page="submit-request">

    <div class="toast-container" id="toastContainer"></div>

    <header data-shell="topbar"></header>

    <div class="app-layout">
        <nav data-shell="sidebar"></nav>

        <div class="main-content">
            <div class="content-area">
                <section class="view-section">
                    <div class="flex-between mb-4">
                        <h1>Submit a New Request or Incident</h1>
                        <button class="btn btn-secondary"
                            onclick="location.href='dashboard.html'">Cancel</button>
                    </div>

                    <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 24px;">
                        <div class="panel">
                            <h2
                                style="font-size: 16px; border-bottom: 1px solid var(--panel-border); padding-bottom: 12px; margin-bottom: 20px;">
                                Request Details</h2>

                            <div class="form-group">
                                <label class="form-label">Summary / Title *</label>
                                <input type="text" class="form-control"
                                    placeholder="Brief description of the issue or request">
                            </div>

                            <div class="flex-row form-group">
                                <div style="flex: 1;">
                                    <label class="form-label">Category *</label>
                                    <select class="form-control">
                                        <option value="" disabled selected>Select Category...</option>
                                        <option>Hardware (Laptop, Monitor, Peripherals)</option>
                                        <option>Software (Licenses, Installation)</option>
                                        <option>Network & Connectivity (VPN, Wi-Fi)</option>
                                        <option>Access & Identity (SSO, Active Directory)</option>
                                        <option>Enterprise Applications (Jira, Salesforce)</option>
                                        <option>Other / Unsure</option>
                                    </select>
                                </div>
                                <div style="flex: 1;">
                                    <label class="form-label">Sub-Category</label>
                                    <select class="form-control">
                                        <option value="" disabled selected>Select Sub-Category...</option>
                                        <option>New Request</option>
                                        <option>Break / Fix Incident</option>
                                        <option>Modification / Change</option>
                                    </select>
                                </div>
                            </div>

                            <div class="form-group">
                                <label class="form-label">Detailed Description *</label>
                                <textarea class="form-control" rows="6"
                                    placeholder="Please provide as much detail as possible. If this is an incident, include steps to reproduce, error messages, and what you were doing when it occurred."></textarea>
                            </div>

                            <div class="form-group">
                                <label class="form-label">Steps to Reproduce (For Incidents)</label>
                                <textarea class="form-control" rows="3"
                                    placeholder="1. Go to...\n2. Click on...\n3. Error appears..."></textarea>
                            </div>

                            <div class="form-group">
                                <label class="form-label">Attachments (Logs, Screenshots, Documents)</label>
                                <div style="border: 2px dashed var(--panel-border); border-radius: 6px; padding: 32px; text-align: center; color: var(--text-secondary); cursor: pointer; transition: all 0.2s;"
                                    onmouseover="this.style.borderColor='var(--accent-color)'"
                                    onmouseout="this.style.borderColor='var(--panel-border)'">
                                    <svg width="32" height="32" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                        style="margin-bottom: 8px;">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12">
                                        </path>
                                    </svg>
                                    <p>Drag and drop files here or click to browse</p>
                                    <p style="font-size: 12px; margin-top: 4px;">Max file size: 25MB. Supported: .log,
                                        .png,
                                        .pdf, .docx</p>
                                    <input type="file" style="display: none;">
                                </div>
                            </div>
                        </div>

                        <div class="panel" style="height: fit-content;">
                            <h2
                                style="font-size: 16px; border-bottom: 1px solid var(--panel-border); padding-bottom: 12px; margin-bottom: 20px;">
                                Classification & Impact</h2>

                            <div class="form-group">
                                <label class="form-label">Urgency (How quickly is a fix needed?)</label>
                                <select class="form-control">
                                    <option>Low - Workaround available, no immediate pressure</option>
                                    <option>Medium - Affects daily work, but manageable</option>
                                    <option>High - Severe impact on productivity</option>
                                    <option>Critical - Business halting, VIP user</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label class="form-label">Impact (How many users/services affected?)</label>
                                <select class="form-control">
                                    <option>Single User</option>
                                    <option>Department / Team</option>
                                    <option>Site-wide / Regional</option>
                                    <option>Global / Enterprise-wide</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label class="form-label">Affected Configuration Item (CI) / Resource</label>
                                <div style="position: relative;">
                                    <input type="text" class="form-control"
                                        placeholder="Search resources (e.g. VRT-WEB-01)...">
                                    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                                        style="position: absolute; right: 12px; top: 10px; color: var(--text-secondary);">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                                    </svg>
                                </div>
                            </div>

                            <div class="form-group">
                                <label class="form-label">Preferred Contact Method</label>
                                <select class="form-control">
                                    <option>Email</option>
                                    <option>Slack / Teams</option>
                                    <option>Phone</option>
                                </select>
                            </div>

                            <div
                                style="background: var(--button-secondary-bg); padding: 16px; border-radius: 6px; margin-top: 24px; border: 1px solid var(--panel-border);">
                                <div class="text-sm" style="margin-bottom: 12px;"><strong>Suggested KB
                                        Articles:</strong>
                                </div>
                                <ul style="list-style: none; display: flex; flex-direction: column; gap: 8px;">
                                    <li
                                        style="font-size: 13px; color: var(--accent-color); cursor: pointer; text-decoration: underline;">
                                        How to request a new software license</li>
                                    <li
                                        style="font-size: 13px; color: var(--accent-color); cursor: pointer; text-decoration: underline;">
                                        Troubleshooting VPN Connectivity Issues</li>
                                </ul>
                            </div>

                            <button class="btn btn-primary"
                                style="width: 100%; margin-top: 24px; padding: 12px; font-size: 16px;"
                                onclick="flash('Ticket submitted successfully! Ticket ID: REQ-2056', 'success', 'ticket-detail.html')[2])">Submit
                                Ticket</button>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <script src="js/layout.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
