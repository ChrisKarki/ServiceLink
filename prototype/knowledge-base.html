<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Base · ServiceLink</title>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@100;200;300;400;500;600;700&family=IBM+Plex+Sans:wght@100;200;300;400;500;600;700&family=Montserrat:wght@100;200;300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <script src="js/theme.js"></script>
    <style>
        /* KB category badges */
        .kb-cat-badge {
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            white-space: nowrap;
        }

        .kb-cat-badge.networking {
            color: #60a5fa;
            border: 1px solid rgba(96, 165, 250, 0.35);
            background: rgba(96, 165, 250, 0.08);
        }

        .kb-cat-badge.hardware {
            color: #f59e0b;
            border: 1px solid rgba(245, 158, 11, 0.35);
            background: rgba(245, 158, 11, 0.08);
        }

        .kb-cat-badge.software {
            color: #a78bfa;
            border: 1px solid rgba(167, 139, 250, 0.35);
            background: rgba(167, 139, 250, 0.08);
        }

        .kb-cat-badge.security {
            color: #f87171;
            border: 1px solid rgba(248, 113, 113, 0.35);
            background: rgba(248, 113, 113, 0.08);
        }

        .kb-cat-badge.hr {
            color: #34d399;
            border: 1px solid rgba(52, 211, 153, 0.35);
            background: rgba(52, 211, 153, 0.08);
        }

        /* Table row hover for KB */
        .kb-table tbody tr {
            cursor: pointer;
            transition: background 0.15s ease;
        }

        .kb-table tbody tr:hover td {
            background: var(--button-secondary-bg);
        }

        .kb-table td.kb-id {
            font-weight: 500;
            color: var(--text-primary);
            white-space: nowrap;
        }

        .kb-table td.kb-title {
            color: var(--text-primary);
        }

        .kb-table td.kb-author {
            white-space: nowrap;
        }

        .kb-table td.kb-views {
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        .kb-table th.kb-views-header {
            text-align: right;
        }

        .kb-table td.kb-action {
            text-align: right;
        }

        .kb-table th.kb-action-header {
            text-align: right;
        }

        .kb-edit-link {
            color: var(--accent-color);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: color 0.2s;
        }

        .kb-edit-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body data-page="knowledge-base">

    <div class="toast-container" id="toastContainer"></div>

    <header data-shell="topbar"></header>

    <div class="app-layout">
        <nav data-shell="sidebar"></nav>

        <div class="main-content">
            <div class="content-area">
                <section class="view-section">
                    <div class="flex-between mb-4">
                        <h1>Knowledge Base</h1>
                        <button class="btn btn-primary" onclick="location.href='kb-article-new.html'">+ New
                            Article</button>
                    </div>

                    <!-- Category Filter Tabs -->
                    <div class="filter-bar" style="margin-bottom: 24px;">
                        <div class="filter-pill active" onclick="filterKB(this, 'all')">All Articles</div>
                        <div class="filter-pill" onclick="filterKB(this, 'networking')">Networking &amp; VPN</div>
                        <div class="filter-pill" onclick="filterKB(this, 'hardware')">Hardware &amp; Policies</div>
                        <div class="filter-pill" onclick="filterKB(this, 'software')">Software &amp; Licenses</div>
                        <div class="filter-pill" onclick="filterKB(this, 'security')">Security &amp; Identity</div>
                        <div class="filter-pill" onclick="filterKB(this, 'hr')">HR &amp; Onboarding</div>
                    </div>

                    <!-- Articles Table -->
                    <div class="panel" style="padding: 0;">
                        <div class="table-wrapper">
                            <table class="kb-table">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Title</th>
                                        <th>Category</th>
                                        <th>Author</th>
                                        <th class="kb-views-header">Views</th>
                                        <th class="kb-action-header">Action</th>
                                    </tr>
                                </thead>
                                <tbody id="kbTableBody">
                                    <!-- Rows injected by JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>

                </section>
            </div>
        </div>
    </div>

    <script src="js/layout.js"></script>
    <script src="js/app.js"></script>
    <script>
        const KB_ARTICLES = [
            { id: 'KB-1042', title: 'Troubleshooting Remote VPN Connectivity Drops', category: 'networking', categoryLabel: 'Networking & VPN', author: 'Prabhnoorjit Hans', views: 1402 },
            { id: 'KB-1038', title: 'Requesting New Hardware via ServiceLink', category: 'hardware', categoryLabel: 'Hardware & Policies', author: 'Katie Weng', views: 845 },
            { id: 'KB-1025', title: 'Resolving Zoom Audio Issues on Mac', category: 'software', categoryLabel: 'Software & Licenses', author: 'Arshdeep Mutti', views: 2110 },
            { id: 'KB-1024', title: 'MacBook Pro M3 Max Initial Setup Guide', category: 'hardware', categoryLabel: 'Hardware & Policies', author: 'Chris Karki', views: 3420 },
            { id: 'KB-1023', title: 'Configuring MFA & Okta Passkeys', category: 'security', categoryLabel: 'Security & Identity', author: 'InfoSec Team', views: 5102 },
            { id: 'KB-1022', title: 'New Employee IT Onboarding Checklist', category: 'hr', categoryLabel: 'HR & Onboarding', author: 'Sarah Jenkins', views: 4890 },
            { id: 'KB-1021', title: 'Connecting to HQ Wi-Fi (ServiceLink-Secure)', category: 'networking', categoryLabel: 'Networking & VPN', author: 'Prabhnoorjit Hans', views: 6210 },
            { id: 'KB-1020', title: 'Requesting JetBrains & GitHub Copilot Licenses', category: 'software', categoryLabel: 'Software & Licenses', author: 'Arshdeep Mutti', views: 1890 },
            { id: 'KB-1019', title: 'Docking Station Display & Firmware Fixes', category: 'hardware', categoryLabel: 'Hardware & Policies', author: 'Katie Weng', views: 932 },
            { id: 'KB-1018', title: 'Docker Desktop Memory Limits on macOS', category: 'software', categoryLabel: 'Software & Licenses', author: 'DevOps Team', views: 2450 },
            { id: 'KB-1017', title: 'AWS EKS Access & Kubectl Configuration', category: 'networking', categoryLabel: 'Networking & VPN', author: 'DevOps Team', views: 1780 },
            { id: 'KB-1016', title: 'Replacing Lost or Damaged Peripherals', category: 'hardware', categoryLabel: 'Hardware & Policies', author: 'Katie Weng', views: 654 },
            { id: 'KB-1015', title: 'Report Security Vulnerability or Phishing Email', category: 'security', categoryLabel: 'Security & Identity', author: 'InfoSec Team', views: 3910 },
            { id: 'KB-1014', title: 'Figma Enterprise SSO Login Troubleshooting', category: 'software', categoryLabel: 'Software & Licenses', author: 'Design Team', views: 1120 },
        ];

        function renderKBTable(filter) {
            const tbody = document.getElementById('kbTableBody');
            const articles = filter === 'all' ? KB_ARTICLES : KB_ARTICLES.filter(a => a.category === filter);
            tbody.innerHTML = articles.map(function (a) {
                return '<tr onclick="location.href=\'kb-article-view.html?id=' + a.id + '\'">' +
                    '<td class="kb-id">' + a.id + '</td>' +
                    '<td class="kb-title">' + a.title + '</td>' +
                    '<td><span class="kb-cat-badge ' + a.category + '">' + a.categoryLabel + '</span></td>' +
                    '<td class="kb-author">' + a.author + '</td>' +
                    '<td class="kb-views">' + a.views.toLocaleString() + '</td>' +
                    '<td class="kb-action"><a class="kb-edit-link" onclick="event.stopPropagation(); location.href=\'kb-article-edit.html\'">Edit</a></td>' +
                    '</tr>';
            }).join('');
        }

        function filterKB(el, cat) {
            selectFilter(el);
            renderKBTable(cat);
        }

        // Initial render
        renderKBTable('all');
    </script>

</body>

</html>
