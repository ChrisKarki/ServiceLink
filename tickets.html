<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tickets &middot; ServiceLink</title>
  <link rel="stylesheet" href="tickets.css">
</head>
<body>
<div class="app-layout">

  <!-- ══ SIDEBAR ══ -->
  <div class="sidebar">
    <div class="sidebar-logo">Service<span>Link</span></div>
    <div class="sidebar-user">
      <div class="avatar">JO</div>
      <div class="sidebar-user-info">
        <div class="sidebar-user-name">Jordan Okafor</div>
        <div class="sidebar-user-role">Technician</div>
      </div>
    </div>
    <div class="sidebar-section">Main</div>
    <div class="nav-item"><span class="nav-icon">📊</span> Dashboard</div>
    <div class="nav-item active"><span class="nav-icon">🎫</span> Tickets <span class="nav-badge" id="openBadge"></span></div>
    <div class="nav-item"><span class="nav-icon">💻</span> Resources</div>
    <div class="nav-item"><span class="nav-icon">📚</span> Knowledge Base</div>
    <div class="sidebar-section">Management</div>
    <div class="nav-item"><span class="nav-icon">📈</span> Reports</div>
    <div class="nav-item"><span class="nav-icon">👥</span> Team</div>
    <div class="sidebar-bottom">
      <a href="#">⚙ Settings</a>
      <a href="#">← Sign out</a>
    </div>
  </div>

  <!-- ══ MAIN ══ -->
  <div class="main-content">

    <!-- Top bar -->
    <div class="topbar">
      <div>
        <div class="topbar-title">Tickets</div>
        <div class="topbar-sub">Technician view · Jordan Okafor</div>
      </div>
      <div class="topbar-search">
        <input type="search" id="ticketSearch" placeholder="Search tickets, IDs, requesters…" aria-label="Search tickets">
      </div>
      <div class="topbar-actions">
        <div class="icon-btn">🔔<span class="dot"></span></div>
        <div class="icon-btn">👤</div>
      </div>
    </div>

    <div class="page-body">

      <!-- Page header -->
      <div class="page-header">
        <h1>All Tickets</h1>
        <button class="btn-lg primary">+ New Ticket</button>
      </div>

      <!-- Filter row (RAD Appendix C — inline filters) -->
      <div class="filter-row">
        <span class="filter-label">Filters:</span>
        <select class="filter-select" id="fState" aria-label="Filter by status">
          <option value="all">All Unresolved</option>
          <option value="New">New</option>
          <option value="Assigned">Assigned</option>
          <option value="In Progress">In Progress</option>
          <option value="Waiting on User">Waiting on User</option>
          <option value="Resolved">Resolved</option>
          <option value="Closed">Closed</option>
        </select>
        <select class="filter-select" id="fPriority" aria-label="Filter by priority">
          <option value="all">All Priorities</option>
          <option value="Critical">Critical</option>
          <option value="High">High</option>
          <option value="Medium">Medium</option>
          <option value="Low">Low</option>
        </select>
        <select class="filter-select" id="fAgent" aria-label="Filter by agent">
          <option value="all">All Agents</option>
          <option value="me">Me (J. Okafor)</option>
          <option value="unassigned">Unassigned</option>
          <option value="P. Mehta">P. Mehta</option>
          <option value="L. Tran">L. Tran</option>
          <option value="S. Okeke">S. Okeke</option>
        </select>
        <button class="btn-sm btn-blue" id="applyFilters">Apply</button>
        <button class="btn-sm btn-outline" id="resetFilters">Reset</button>
      </div>

      <!-- Ticket table -->
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th data-sort="id">Ticket ID</th>
              <th data-sort="subject">Subject</th>
              <th data-sort="requester">Requester</th>
              <th data-sort="priority">Priority</th>
              <th data-sort="sla">SLA</th>
              <th data-sort="status">Status</th>
            </tr>
          </thead>
          <tbody id="ticketBody"></tbody>
        </table>

        <div class="empty-state" id="emptyState" hidden>
          <div class="empty-icon">🎫</div>
          <p>No tickets match these filters.</p>
          <button class="btn-sm btn-outline" id="clearFromEmpty">Reset filters</button>
        </div>

        <div class="table-footer">
          <span id="pagerCount">&mdash;</span>
          <div class="page-btns">
            <button class="page-btn" id="prevPage">← Prev</button>
            <button class="page-btn" id="nextPage">Next →</button>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
<script src="tickets.js"></script>
</body>
</html>
